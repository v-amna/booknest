{% load static %}

<!-- SEO -->
<meta name="description" content="BookNest - Discover, purchase and review your favourite books online.">
<meta name="keywords" content="books, online bookstore, novels, fiction, reading">
<meta name="author" content="BookNest">

<title>
    {% block extra_title %}{% endblock %} | BookNest
</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/base.css' %}">

{% block extra_css %}
{% endblock %}
<!-- Navigation -->
{% include 'includes/main-nav.html' %}

<!-- Django Messages -->
{% include 'includes/messages.html' %}

<!-- Main Content -->
<main class="container py-4">
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
{% include 'includes/footer.html' %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block postloadjs %}
{% endblock %}
