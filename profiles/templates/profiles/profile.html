{% extends "base.html" %}

{% block extra_title %}
Profile
{% endblock %}

{% block content %}

<div class="container">

    <h1 class="mb-4">
        My Profile
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-primary">

            Save Profile

        </button>

    </form>

</div>

{% endblock %}
