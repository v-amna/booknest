{% extends "base.html" %}

{% block extra_title %}My Profile{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-header">
                    <h2 class="mb-0">My Profile</h2>
                </div>

                <div class="card-body">

                    <p class="text-muted">
                        Manage your delivery information.
                    </p>

                    <form method="POST">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Save Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
