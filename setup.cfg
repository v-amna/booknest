# setup.cfg
[flake8]
max-line-length = 88
exclude =
    migrations,
    .git,
    __pycache__,
    .venv,
    staticfiles,
    manage.py,
    env.py

extend-select = D
# or numpy, pep257
docstring-convention = pep257

[pydocstyle]
convention = pep257
exclude =
    migrations,
    .git,
    __pycache__,
    .venv,
    staticfiles,
    manage.py,
    env.py
    __init__.py
    asgi.py
    urls.py

