{% extends "base.html" %}

{% block extra_title %}
    Edit Book
{% endblock %}

{% block content %}

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="card shadow-sm">
                <div class="card-header bg-black">
                    <p class="h2 mb-0">Edit Book</p>
                </div>
                <div class="card-body">
                    {% if book.cover_image %}
                        <div class="mb-3">
                            <p><strong>Current Cover</strong></p>
                            <img src="{{ book.cover_image.url }}"
                                 alt="{{ book.title }}"
                                 class="img-preview">
                        </div>
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form | crispy }}

                        <div id="new-cover-preview-wrapper" class="mb-3"
                             style="display: none;">
                            <p class="mb-2"><strong>New Cover Preview:</strong>
                            </p>
                            <img id="new-cover-preview"
                                 alt="New cover preview"
                                 class="img-thumbnail"
                                 style="max-width: 200px;">
                        </div>

                        <button class="btn btn-warning" type="submit"> Save
                            Changes
                        </button>
                        <a href="{% url 'book_detail' book.id %}"
                           class="btn btn-secondary"> Cancel </a>
                    </form>
                </div>
            </div>
        </div>

    </div>

{% endblock %}

{% block postloadjs %}
    {{ block.super }}
    <script>
        // Ref: https://developer.mozilla.org/en-US/docs/Web/API/File/Using_files_from_web_applications
        // Since crispy form doesn't have preview built-in, Watch for the change
        // on the file upload input, and then load file using FileReader show it
        // on the img
        document.getElementById('id_cover_image').addEventListener('change', function () {
            // Get the first item.
            let file = this.files[0];
            let wrapper = document.getElementById('new-cover-preview-wrapper');
            let preview = document.getElementById('new-cover-preview');

            if (!file) {
                wrapper.style.display = 'none';
                return;
            }

            //Ref: https://developer.mozilla.org/en-US/docs/Web/API/FileReader
            // Reads file and shows to img tag
            let reader = new FileReader();
            reader.onload = function (event) {
                preview.src = event.target.result;
                wrapper.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });
    </script>
{% endblock %}
