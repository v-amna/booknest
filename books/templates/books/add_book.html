{% extends "base.html" %}

{% block extra_title %}Add Book{% endblock %}

{% block content %}

<div class="container">

    <h1 class="mb-4">Add Book</h1>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-success">

            Add Book

        </button>

        <a href="{% url 'books' %}"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
{% block postloadjs %}
{{ block.super }}

<script>

    $('#new-image').change(function() {

        var file = $('#new-image')[0].files[0];

        $('.custom-file-label').text(file.name);

    });

</script>

{% endblock %}
