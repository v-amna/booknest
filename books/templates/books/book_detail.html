{% extends "base.html" %}

{% block extra_title %}{{ book.title }}{% endblock %}

{% block content %}

<div class="container">

```
<div class="row">

    <div class="col-md-4">

        {% if book.image %}
            <img src="{{ book.image.url }}"
                 class="img-fluid"
                 alt="{{ book.title }}">
        {% endif %}

    </div>

    <div class="col-md-8">

        <h1>{{ book.title }}</h1>

        <h5>{{ book.author }}</h5>

        <p class="mt-3">
            {{ book.description }}
        </p>

        <p class="fs-4 fw-bold">
            €{{ book.price }}
        </p>

        <a href="#"
           class="btn btn-success">
            Add to Cart
        </a>

        <a href="{% url 'books' %}"
           class="btn btn-outline-secondary">
            Back to Books
        </a>

    </div>

</div>
```

</div>
{% endblock %}
