{% extends "base.html" %}

{% block extra_title %}Books{% endblock %}

{% block content %}

<div class="container">

```
<h1 class="mb-4">Book Collection</h1>

<div class="row">

    {% for book in books %}
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5>{{ book.title }}</h5>

                    <p>{{ book.author }}</p>

                    <p>€{{ book.price }}</p>

                <a href="{% url 'book_detail' book.id %}" class="btn btn-primary">
                    View Details
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
```

</div>

{% endblock %}
