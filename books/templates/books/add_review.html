{% extends "base.html" %}

{% block extra_title %}
Add Review
{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">

        Add Review

    </h2>

    <h5 class="mb-4">

        {{ book.title }}

    </h5>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-primary">

            Submit Review

        </button>

        <a
            href="{% url 'book_detail' book.id %}"
            class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
