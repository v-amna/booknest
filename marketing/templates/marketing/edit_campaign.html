{% extends "base.html" %}

{% block extra_title %} Edit Campaign {% endblock %}

{% block content %}

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="card shadow-sm">
                <div class="card-header bg-black">
                    <p class="h2 mb-0">Edit Campaign</p>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form | crispy }}
                        <button class="btn btn-warning" type="submit"> Save
                            Changes
                        </button>
                        <a href="{% url 'campaign_list' %}"
                           class="btn btn-secondary"> Cancel </a>
                        <a href="{% url 'send_campaign' campaign.id %}"
                           class="btn btn-primary"
                           onclick="return confirm('Send campaign \'{{ campaign.title }}\' to all active subscribers?');">
                            Send
                        </a>
                        <a href="{% url 'delete_campaign' campaign.id %}"
                           class="btn btn-danger"
                           onclick="return confirm('Delete campaign \'{{ campaign.title }}\'? This cannot be undone.');">
                            Delete
                        </a>
                    </form>
                </div>
            </div>
        </div>

    </div>

{% endblock %}
